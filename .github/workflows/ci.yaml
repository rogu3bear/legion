name: Legion CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Add any other specific dependencies for your agents or orchestrator here
          # For example: pip install pyyaml zmq

      - name: Run echo_task CI test
        env:
          PYTHONPATH: ${{ github.workspace }}
          # Add any other ENV VARS your application might need for CI
          # e.g., GENERAL_CHANNEL_ID: "0"
        run: |
          python .github/scripts/ci_test_echo.py 