name: Branch Protection Enforcement
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  enforce-protection:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run CI Suite
      run: |
        python -m compileall .
        make test

    - name: Coverage Gate
      run: |
        pip install pytest-cov
        python -m pytest --cov=legion --cov=core --cov=skills --cov-fail-under=14

    - name: Documentation Lint
      run: |
        python scripts/lint_docs.py

    - name: Port Collision Scan
      run: |
        python check_ports.py
