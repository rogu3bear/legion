name: Interface Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'interface/**'
      - '.github/workflows/interface_ci.yaml'
      - 'pyproject.toml'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'interface/**'
      - '.github/workflows/interface_ci.yaml'
      - 'pyproject.toml'
      - 'requirements.txt'
  workflow_dispatch:  # Enable manual triggering for CI debugging

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11"] # Test against min and a recent version

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install pre-commit for accessing hooks config if needed, or install tools directly
        pip install pre-commit # Or pip install ruff mypy bandit pytest pytest-asyncio

    - name: Ruff (optional)
      run: |
        if command -v ruff >/dev/null; then
          ruff check interface/ --config pyproject.toml
          ruff format interface/ --check --config pyproject.toml
        else
          echo "\u26a0 Ruff not installed; skipping style check"
        fi

    - name: Type check with MyPy
      run: |
        mypy interface/ --config-file pyproject.toml

    - name: Security check with Bandit
      run: |
        bandit -c pyproject.toml -r interface/

    - name: Run Pytest
      run: |
        # Run interface backend tests if pytest available
        if command -v pytest >/dev/null; then
          pytest tests/api/ tests/test_websockets.py tests/test_interface.py --maxfail=1 --disable-warnings -q
        else
          echo "\u26a0 Pytest not installed; skipping tests"
        fi
