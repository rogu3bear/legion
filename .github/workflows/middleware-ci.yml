name: Middleware CI
on:
  push:
    paths:
      - 'middleware/**'
  pull_request:
    paths:
      - 'middleware/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Redis for testing
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
      - name: Install middleware deps
        run: |
          cd middleware
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: |
          cd middleware
          if command -v pytest >/dev/null; then
            pytest -q
          else
            echo "⚠ Pytest not installed; skipping tests"
          fi
      - name: Setup environment and start middleware service natively
        run: |
          cd middleware
          # Generate ports configuration
          scripts/gen_ports_env.sh
          # Start Redis on background if not running
          sudo service redis-server start || redis-server --port 6379 --daemonize yes
          # Start middleware service in background using uvicorn/python directly
          source .env && python -m uvicorn app:app --host 0.0.0.0 --port ${SERVICE_PORT:-7777} &
          MIDDLEWARE_PID=$!
          echo "SERVICE_PID=$MIDDLEWARE_PID" >> $GITHUB_ENV
      - name: Wait for health
        run: |
          sleep 5
          cd middleware
          source .env
          curl -f http://localhost:${SERVICE_PORT:-7777}/health
      - name: Invoke sample
        run: |
          cd middleware
          source .env
          curl -X POST -H "Authorization: Bearer ${API_TOKEN:-test-token}" -H "Content-Type: application/json" \
            -d '{"data": {"agent_name":"test","interaction_id":"1","role":"user","tokens":1,"embedding":[0.1,0.2],"timestamp":"2025-01-01T00:00:00Z","tags":[]}}' \
            http://localhost:${SERVICE_PORT:-7777}/invoke
      - name: Fetch context
        run: |
          cd middleware
          source .env
          curl -f http://localhost:${SERVICE_PORT:-7777}/context/test/1
      - name: Cleanup
        if: always()
        run: |
          # Stop middleware service
          if [ ! -z "$SERVICE_PID" ]; then
            kill $SERVICE_PID || true
          fi
