name: Middleware CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  middleware-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          
      - name: Install Redis for middleware tests
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
          
      - name: Test middleware with native Redis
        env:
          REDIS: 6379
        run: |
          # Start Redis on test port
          redis-server --port ${REDIS} --daemonize yes
          sleep 3
          
          # Run middleware tests
          python -m pytest tests/middleware/ -v
          
          # Cleanup
          redis-cli -p ${REDIS} shutdown || true
