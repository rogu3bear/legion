name: build-base-image
on:
  push:
    branches: [main]
    paths: [Dockerfile, requirements.txt, requirements.dev.txt]
  pull_request:
    branches: [main]
    paths: [Dockerfile, requirements.txt, requirements.dev.txt]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push
        run: |
          docker build --target builder -t ghcr.io/${{ github.repository_owner }}/legion-base:py310 .
          docker push ghcr.io/${{ github.repository_owner }}/legion-base:py310
