name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -U pip
          pip install -r requirements.txt
          pip install flake8
      - name: Lint code
        run: |
          . venv/bin/activate
          flake8 .
      - name: Security Scan (Bandit)
        run: |
          . venv/bin/activate
          bandit -r legion/ -o artifacts/reports/bandit_report_ci.json -f json
      - name: Run tests
        env:
          GENERAL_CHANNEL_ID: '0'
          AGENT_FEED_CHANNEL_ID: '0'
          ARCHITECT_CHANNEL_ID: '0'
          METRICS_CHANNEL_ID: '0'
          THERAPIST_CHANNEL_ID: '0'
          DESIGN_CHANNEL_ID: '0'
          DISCORD_TOKEN: 'test'
        run: |
          . venv/bin/activate
          mkdir -p scripts/logs
          mkdir -p artifacts/reports
          pytest tests/agents/ tests/core/ tests/discord/ tests/integration/ --maxfail=1 --disable-warnings -q
      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: legion-logs-build
          path: scripts/logs/
      - name: Upload Reports on Failure
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: legion-reports-build
          path: artifacts/reports/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        mkdir -p scripts/logs
        pytest -v --maxfail=5 --disable-warnings
      env:
        PYTHONPATH: $PYTHONPATH:.
    - name: Upload Logs on Failure
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: legion-logs-test
        path: scripts/logs/ 