name: Legion ArchitectAgent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-architect-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run ArchitectAgent tests
        id: pytest
        run: |
          pytest tests/test_architect_agent.py --maxfail=1 --disable-warnings --tb=short -v | tee test_output.log
      - name: Upload logs and artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: legion-architect-logs
          path: |
            memory/logs/
            artifacts/reports/
            test_output.log 