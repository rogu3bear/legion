name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Create and activate virtual environment
        run: |
          python -m venv .venv
          bash scripts/activate_once.sh
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install flake8
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Or your preferred LTS version
      - name: Install npm dependencies
        run: |
          # Assuming package.json is in the root and frontend is in ui/frontend
          # If package.json for frontend is in ui/frontend, cd there first
          if [ -f "ui/frontend/package.json" ]; then
            npm install --prefix ui/frontend
          elif [ -f "package.json" ]; then
            npm install
          else
            echo "No package.json found for npm install."
          fi
      - name: Run Make Lint
        run: make lint || true
      - name: Run Make Test
        run: make test || true
      - name: Lint with ESLint (Frontend)
        run: |
          # Adjust path to ESLint config and source if needed
          if [ -f "ui/frontend/package.json" ]; then
            npm run lint --prefix ui/frontend --if-present -- --max-warnings 0
          elif [ -f "package.json" ] && grep -q '"lint"' package.json; then # Check if lint script exists
            npm run lint -- --max-warnings 0
          else
            echo "ESLint lint script not found or package.json missing."
          fi
      - name: Run npm tests with coverage (Frontend)
        run: |
          # Adjust path and command if needed
          # This assumes a test script configured for coverage
          MIN_COVERAGE=90
          if [ -f "ui/frontend/package.json" ]; then
            # Attempt to run, capture output, and check coverage
            # This is a placeholder for actual coverage checking logic
            # You'll need a tool like jest with coverage reporters
            echo "Attempting npm test --prefix ui/frontend --if-present -- --coverage"
            # npm test --prefix ui/frontend --if-present -- --coverage
            # Add actual coverage check here, e.g., parse coverage report
            echo "Coverage check for frontend not fully implemented in CI script yet."
          elif [ -f "package.json" ] && grep -q '"test"' package.json; then
            echo "Attempting npm test -- --coverage"
            # npm test -- --coverage
            echo "Coverage check for root package.json not fully implemented in CI script yet."
          else
            echo "npm test script not found or package.json missing."
          fi
      - name: Lint code
        run: |
          bash scripts/activate_once.sh
          flake8 .
      - name: Type Check (mypy)
        run: |
          bash scripts/activate_once.sh
          mypy legion/ > artifacts/reports/mypy_report.txt || true
      - name: Ruff Lint
        run: |
          bash scripts/activate_once.sh
          ruff check legion/ > artifacts/reports/ruff_report.txt || true
      - name: Security Scan (Bandit)
        run: |
          bash scripts/activate_once.sh
          bandit -r legion/ -o artifacts/reports/bandit_report_ci.json -f json
      - name: Check port availability
        run: |
          bash scripts/activate_once.sh
          python - << 'PYCODE'
          from legion.ports import load_runtime_ports
          from legion.utils.port_conflict_checker import check_ports_available
          ports = load_runtime_ports()
          check_ports_available(ports)
          PYCODE
      - name: Run tests
        env:
          GENERAL_CHANNEL_ID: '0'
          AGENT_FEED_CHANNEL_ID: '0'
          PORT_ALLOCATOR_WEB: 8000
          PORT_ALLOCATOR_CHROMA: 27020
          PORT_ALLOCATOR_PROMETHEUS: 9090
          PORT_ALLOCATOR_REDIS: 6379
          PORT_ALLOCATOR_POSTGRES: 5432
          PORT_ALLOCATOR_GRAFANA: 7806
          ORCHESTRATOR_API_URL: 'http://localhost:${{ env.PORT_ALLOCATOR_WEB || 8000 }}'
        run: |
          bash scripts/activate_once.sh
          mkdir -p scripts/logs
          mkdir -p artifacts/reports
          mkdir -p /tmp/ci_logs
          pytest tests/agents/ tests/core/ tests/discord/ tests/integration/ interface/ --maxfail=1 --disable-warnings -q
      - name: Run backend tests
        run: |
          bash scripts/activate_once.sh
          pytest --cov
      - name: Upload CI Logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ci-logs-build
          path: |
            scripts/logs/
            artifacts/reports/
            /tmp/ci_logs/
      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: legion-logs-build
          path: scripts/logs/
      - name: Upload Reports on Failure
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: legion-reports-build
          path: artifacts/reports/

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Create log directories
      run: |
        mkdir -p scripts/logs
        mkdir -p /tmp/ci_logs
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        mkdir -p scripts/logs
        pytest -v --maxfail=5 --disable-warnings
      env:
        PYTHONPATH: $PYTHONPATH:.
    - name: Run integration tests
      run: |
        pytest -q tests/integration
    - name: CLI smoke test
      run: legion list-agents
    - name: Check service health
      env:
        PORT_ALLOCATOR_WEB: 8000
        PORT_ALLOCATOR_CHROMA: 27020
        PORT_ALLOCATOR_PROMETHEUS: 9090
        PORT_ALLOCATOR_REDIS: 6379
        PORT_ALLOCATOR_POSTGRES: 5432
        PORT_ALLOCATOR_GRAFANA: 7806
      run: |
        bash scripts/gen_ports_env.sh
        docker compose up -d --no-build
        sleep 15
        curl -f "http://localhost:${PORT_ALLOCATOR_PROMETHEUS}/-/ready"
        # Redis PING
        python3 - << 'PY'
        import os, redis, sys
        r = redis.Redis(host="localhost", port=int(os.environ['PORT_ALLOCATOR_REDIS']))
        sys.exit(0 if r.ping() else 1)
        PY
        # Postgres simple connect
        pg_isready -h localhost -p ${PORT_ALLOCATOR_POSTGRES}
        # Grafana health
        curl -f "http://localhost:${PORT_ALLOCATOR_GRAFANA}/api/health"
        docker compose down -v
    - name: Upload CI Logs
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: ci-logs-test
        path: |
          scripts/logs/
          /tmp/ci_logs/
    - name: Upload Logs on Failure
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: legion-logs-test
        path: scripts/logs/
    - name: Discord notify
      if: always()
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        status="${{ job.status }}"
        sha="${GITHUB_SHA::7}"
        curl -H "Content-Type: application/json" \\
             -d "{\\"content\\":\\"CI run *${status}* for \`${sha}\`\\"}" \\
             "$DISCORD_WEBHOOK"

  agent-instantiation-guard:
    name: "Agent Instantiation Guard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Create log directories
        run: mkdir -p /tmp/ci_logs
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install libcst
      - name: Run instantiation guard
        run: |
          python scripts/agent_instantiation_guard.py legion/
      - name: Upload CI Logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ci-logs-agent-guard
          path: /tmp/ci_logs/
