name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -U pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          GENERAL_CHANNEL_ID: '0'
          AGENT_FEED_CHANNEL_ID: '0'
          ARCHITECT_CHANNEL_ID: '0'
          METRICS_CHANNEL_ID: '0'
          THERAPIST_CHANNEL_ID: '0'
          DESIGN_CHANNEL_ID: '0'
          DISCORD_TOKEN: 'test'
        run: |
          . venv/bin/activate
          pytest tests/agents/ tests/core/ tests/discord/ tests/integration/ --maxfail=1 --disable-warnings -q
      - name: Lint code
        run: |
          . venv/bin/activate
          pip install flake8
          flake8 .

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest -v --maxfail=5 --disable-warnings
      env:
        PYTHONPATH: $PYTHONPATH:. 