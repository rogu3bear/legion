# docker-compose.yml for Legion Web Interface


services:
  web:
    env_file:
      - .env.ports
    build:
      context: .
      dockerfile: Dockerfile
      target: "runtime"
    container_name: legion-web
    command: bash -c "alembic upgrade head && uvicorn interface.main:app --host 0.0.0.0 --port 8000 --reload" # Use reload for dev
    volumes:
      - ./interface:/app/interface
      - ./legion:/app/legion
      - ./memory:/app/memory
      - ./skills:/app/skills
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
      - ./memory/db:/app/memory/db # Mount DB volume
      - ./.env:/app/.env # Mount .env file
    # Use PORT_ALLOCATOR_DEV_FRONTEND for dev frontend port (default 8000)
    ports:
      - "${PORT_ALLOCATOR_DEV_FRONTEND:-8000}:8000"
    healthcheck:
      # Use PORT_ALLOCATOR_WEB_UI for healthcheck port (default 7803)
      test: "curl -f http://web:${PORT_ALLOCATOR_WEB_UI:-7803}/health || exit 1"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT_ALLOCATOR_DEV_FRONTEND=8000
      # Use PORT_ALLOCATOR_ORCHESTRATOR for orchestrator address (default 5555)
      # - ORCHESTRATOR_ADDRESS=tcp://host.docker.internal:${PORT_ALLOCATOR_ORCHESTRATOR:-5555} # Example for Docker Desktop
      # Add other necessary env vars
    depends_on:
      - chroma
    networks:
      - legion-net

  chroma:
    image: 'chromadb/chroma:latest'
    # Use PORT_ALLOCATOR_CHROMA for Chroma port (default 20032)
    ports:
      - "${PORT_ALLOCATOR_CHROMA:-20032}:8000"
    environment:
      - CHROMA_PORT=20032

# Define networks
networks:
  legion-net:
    driver: bridge

# Define volumes if needed for persistent data (e.g., separate DB service)
# volumes:
#   postgres_data:
