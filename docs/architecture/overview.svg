<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300">
  <rect x="20" y="20" width="120" height="40" fill="#b3cde0" stroke="#333"/>
  <text x="80" y="45" font-size="12" text-anchor="middle">Agents</text>

  <rect x="190" y="20" width="120" height="40" fill="#ccebc5" stroke="#333"/>
