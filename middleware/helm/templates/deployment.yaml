apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "legion-middleware.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "legion-middleware.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "legion-middleware.name" . }}
    spec:
      containers:
        - name: middleware
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: middleware-secrets
                  key: api-token
