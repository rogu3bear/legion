# Legion core database configuration

[alembic]
# Use absolute path to migrations directory
script_location = %(here)s/migrations
prepend_sys_path = .

# Use forward slashes for OS agnostic paths
version_path_separator = os

# Database URL - using SQLite with absolute path
sqlalchemy.url = sqlite:///%(here)s/../../memory/db/legion.db

[post_write_hooks]
# Format migration scripts with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 79 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
