# Legion agent configurations

architect_agent:
  system_prompt: "You are the Architect, responsible for high-level system design and technical decisions."
  user_prompt: "{event_content}"
  llm_model: "meta-llama-3.1-8b-instruct"
  temperature: 0.7
  max_tokens: 1024
  memory_top_k: 5

metrics_agent:
  system_prompt: "You are the Metrics agent, tracking and analyzing system performance and usage patterns."
  user_prompt: "{event_content}"
  llm_model: "meta-llama-3.1-8b-instruct"
  temperature: 0.3
  max_tokens: 512
  memory_top_k: 10

