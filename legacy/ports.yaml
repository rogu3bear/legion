# Default Legion Port Configuration
# Ports can be static numbers or a dynamic range string.

orchestrator:
  # ZMQ ports for orchestrator communication
  zmq_rep_port: 27005
  zmq_pub_port: 27006

  # Example of a service that might need a dynamic port if multiple instances run
  # or for flexibility in different environments.
  # telemetry_port: "random(27010-27020)"

agents:
  # Default base port, specific agent ports might be allocated from a range
  # or defined statically if known.
  # This example shows static definitions.
  therapist_agent_port: 27100
  executor_agent_port: 27101
  # For a system that might have many dynamically named agents:
  # dynamic_agent_ports: "random(27150-27199)" # UnifiedPortManager would allocate from this for new agents

middleware:
  # Static ports for middleware components if they run as separate services.
  # If they are part of the orchestrator, they might not need separate ports.
  validator_port: 27200
  hallucination_guard_port: 27201

# Common services often used with Legion
services:
  web_ui: 27000       # FastAPI/Uvicorn for Legion's own web interface
  redis: 6379         # Standard Redis port (often managed externally or in Docker)
  postgres: 5432      # Standard PostgreSQL port (similarly managed)
  prometheus: 9090    # Standard Prometheus port
  grafana: 3000       # Standard Grafana port

  # Example of a service that requires a specific port, not part of a logical group like 'orchestrator'
  vector_db_port: 27300

# Services for the main docker-compose.yml
core_services:
  middleware: 27010
  chroma: 27020

# Example for a component requiring a specific named port for testing
# test_service:
#   specific_test_port: 29999
