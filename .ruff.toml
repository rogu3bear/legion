[tool.ruff]
target-version = "py38"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B", "A", "UP", "N", "T20", "SIM", "PTH", "RUF"]
ignore = ["E501", "B008", "C901", "T201", "S101"]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"interface/schemas/agent.py" = ["N801"]

[tool.ruff.lint.isort]
known-first-party = ["legion", "interface", "core", "skills", "memory", "integration"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
