line-length = 88
target-version = "py38"

[lint]
select = ["E", "W", "F", "I", "C", "B", "A", "UP", "N", "T20", "SIM", "PTH", "RUF"]
ignore = ["E501", "B008", "C901", "T201", "S101"]
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"interface/schemas/agent.py" = ["N801"]

[lint.isort]
known-first-party = ["legion", "interface", "core", "skills", "memory", "integration"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    ".*",
    "*.pyi",
    "*.js",
    "*.css",
    "*.html",
    "*.jsonl",
    "*.db",
    "migrations/versions/*",
    "tests",
    "scripts",
]
