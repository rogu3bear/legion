<!-- Minimal stub for Legion interface -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legion Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .header {
            background-color: #1f2937; /* Tailwind gray-800 */
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        .container-lg { max-width: 1280px; margin-left: auto; margin-right: auto; padding: 1rem; }
        .content-box {
            background-color: white;
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
        }
        .status-badge { display: inline-block; padding: 0.25em 0.6em; font-size: 0.75em; font-weight: 700; line-height: 1; text-align: center; white-space: nowrap; vertical-align: baseline; border-radius: 0.375rem; }
        .tag-chip {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            margin: 0.125rem;
            font-size: 0.8rem;
            font-weight: 500;
            background-color: #e5e7eb; /* Tailwind gray-200 */
            color: #374151; /* Tailwind gray-700 */
            border-radius: 9999px;
            border: 1px solid #d1d5db; /* Tailwind gray-300 */
        }
        .tag-unset {
            background-color: #f3f4f6; /* Tailwind gray-100 */
            color: #6b7280; /* Tailwind gray-500 */
            border-style: dashed;
        }
        .filter-controls label {
            margin-right: 0.5rem;
            font-weight: 500;
        }
        .filter-controls select,
        .filter-controls input {
            padding: 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid #d1d5db; /* Tailwind gray-300 */
            margin-right: 1rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 600;
            transition: background-color 0.2s ease-in-out;
        }
        .btn-primary {
            background-color: #3b82f6; /* Tailwind blue-500 */
            color: white;
        }
        .btn-primary:hover {
            background-color: #2563eb; /* Tailwind blue-600 */
        }
    </style>
</head>
<body class="text-gray-800">
    <header class="header">
        <h1 class="text-3xl font-bold">Legion System Dashboard</h1>
    </header>

    <main class="container-lg mt-6">
        <!-- Agent Status Section (existing or placeholder) -->
        <section id="agent-status-section" class="content-box">
            <h2 class="text-2xl font-semibold mb-4 text-gray-700">Agent Status</h2>
            <div id="agent-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Agent cards will be loaded here by js_agents.js -->
                <p class="text-gray-500">Loading agent statuses...</p>
            </div>
        </section>

        <!-- Task Registry Section -->
        <section id="task-registry-section" class="content-box">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-semibold text-gray-700">Task Registry</h2>
                <button id="refresh-tasks-btn" class="btn btn-primary">Refresh Tasks</button>
            </div>

            <div class="filter-controls flex items-center mb-6 p-4 bg-gray-50 rounded-md">
                <label for="filter-task-status">Status:</label>
                <select id="filter-task-status">
                    <option value="">All</option>
                    <option value="pending">Pending</option>
                    <option value="running">Running</option>
                    <option value="completed">Completed</option>
                    <option value="failed">Failed</option>
                    <option value="cancelled">Cancelled</option>
                </select>

                <label for="filter-task-owner">Owner (Agent ID):</label>
                <input type="text" id="filter-task-owner" placeholder="Enter Agent ID">
            </div>

            <div id="task-list-container">
                <p class="text-gray-500">Loading tasks...</p>
            </div>
        </section>
    </main>

    <script src="/static/js_agents.js" defer></script>
    <script src="/static/js_tasks.js" defer></script>
    <!-- Ensure js_feed.js is also included if needed for other parts of the page -->
    <!-- <script src="/static/js_feed.js" defer></script> -->
</body>
</html>
