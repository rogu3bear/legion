# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_stages: [commit]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # Use a recent, stable version
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-toml
    -   id: check-added-large-files

-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version should match the one in requirements.txt/pyproject.toml if possible
    rev: v0.11.8 # Or specific version used in project
    hooks:
    -   id: ruff
        enabled: false
        args: [--fix, --exit-non-zero-on-fix]
    -   id: ruff-format
        enabled: false

# Mypy hook (optional, can be slow)
# Ensure mypy is installed in the environment pre-commit runs in
# or use pre-commit's additional_dependencies
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0 # Use a version compatible with project config
    hooks:
    -   id: mypy
        enabled: false
        # You might need additional_dependencies if mypy needs project dependencies
        # additional_dependencies: [types-PyYAML, types-requests, ...]
        args: [--config-file=pyproject.toml, --ignore-missing-imports, --exclude, "(legion/core/db\\.py|legion/core/db/__init__\\.py)$"]

# Bandit hook (optional)
# -   repo: https://github.com/PyCQA/bandit
#     rev: 1.7.8 # Use a recent version
#     hooks:
#     -   id: bandit
#         args: ["-c", "pyproject.toml"] # Reference config if needed
#         # Exclude tests if desired: args: ["-c", "pyproject.toml", "-r", ".", "-x", "./tests"]

-   repo: local
    hooks:
    -   id: guard-agent-instantiation
        name: Guard direct agent instantiation
        entry: python scripts/agent_instantiation_guard.py legion/
        language: system
        types: [python]
    -   id: ban-3000-port
        name: Ban hard-coded port 3000 in docker-compose.yml
        entry: bash -c "grep -R '3000:' docker-compose.yml && echo 'Hard-coded port 3000 detected, please use env var' && exit 1 || exit 0"
        language: system
        files: ^docker-compose\.yml$
    -   id: check-venv-double-activation
        name: Check for duplicate virtual environment activations
        entry: bash scripts/pre-commit-hooks/check_venv_double_activation.sh
        language: system
        pass_filenames: false
    -   id: ensure-venv-activated
        name: Ensure virtual environment is activated
        entry: bash scripts/activate_once.sh
        language: system
        pass_filenames: false
        always_run: true
    -   id: gen-env-ports
        name: Regenerate .env.ports.example
        entry: bash -c "python scripts/gen_env_ports.py legacy/ports.yaml > .env.ports.example"
        language: system
        # This hook modifies a file. If it changes .env.ports.example,
        # the change needs to be staged (`git add .env.ports.example`) for the commit.
        # CI will verify if the committed version is up-to-date.
        pass_filenames: false # Does not operate on specific files, but generates one.
        always_run: true # Ensure it runs to check/generate.
    -   id: check-env-ports-example
        name: Update .env.ports.example
        language: system
        entry: bash -c "echo '# Development port allocations (27000-28000 range)' > .env.ports.example && echo 'LMSTUDIO_API_URL=http://127.0.0.1:1234/v1' >> .env.ports.example && cat .env.development | grep PORT_ALLOCATOR >> .env.ports.example"
        files: .env.development
        pass_filenames: false
